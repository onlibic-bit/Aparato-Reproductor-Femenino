name: Generar PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generar-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar PDF
        run: python generar_pdf.py

      - name: Subir PDF como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: Aparato-Reproductor-Femenino-PDF
          path: Aparato_Reproductor_Femenino.pdf
          retention-days: 90
